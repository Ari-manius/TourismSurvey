databases:
  - name: otree-db
    plan: free
    databaseName: otree
    user: otree

services:
  - type: web
    name: fiji-survey-otree
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: otree prodserver 8000
    envVars:
      - key: OTREE_ADMIN_PASSWORD
        sync: false
      - key: OTREE_AUTH_LEVEL
        value: STUDY
      - key: OTREE_REST_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: otree-db
          property: connectionString
      - key: OTREE_PRODUCTION
        value: "1"
      - key: PYTHON_VERSION
        value: "3.12.0"
